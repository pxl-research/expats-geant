{% extends "base.html" %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="container" style="display:flex; align-items:center; justify-content:center; min-height:60vh">
  <div style="text-align:center; max-width:420px">
    <div style="width:56px; height:56px; background:var(--danger-bg); border-radius:12px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:1.25rem; color:var(--danger)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <h1 style="margin-bottom:0.75rem">Something went wrong</h1>
    <p style="margin-bottom:1.75rem; max-width:320px; margin-left:auto; margin-right:auto">{{ message }}</p>
    <div style="display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap">
      <a href="/" class="btn btn-primary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Go home
      </a>
      <button type="button" class="btn btn-ghost" id="btn-back">Go back</button>
    </div>
  </div>
</div>
{% endblock %}
