<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Microsoft Forms sample (synthesised)</title>
</head>
<body>
  <!--
    Synthesised from a real Microsoft Forms page (saved 2026-06-22).
    Structure mirrors the relevant data-automation-id attributes; styling
    and Microsoft's own data-bind/jscontroller wiring is stripped so the
    extractor tests stay focused on the contract we depend on.
  -->

  <div data-automation-id="questionItem">
    <span data-automation-id="questionOrdinal">1</span>
    <div data-automation-id="questionTitle"><span>Voornaam</span><span aria-hidden="true">Single line text. </span></div>
    <span data-automation-id="requiredStar" aria-label="Required to answer">*</span>
    <input type="text" data-automation-id="textInput" aria-label="Single line text" />
  </div>

  <div data-automation-id="questionItem">
    <span data-automation-id="questionOrdinal">2</span>
    <div data-automation-id="questionTitle"><span>Naam</span><span> Single line text.</span></div>
    <input type="text" data-automation-id="textInput" aria-label="Single line text" />
  </div>

  <div data-automation-id="questionItem">
    <span data-automation-id="questionOrdinal">3</span>
    <div data-automation-id="questionTitle"><span>E-mailadres</span><span> Single line text.</span></div>
    <input type="text" data-automation-id="textInput" aria-label="Single line text" />
  </div>

  <div data-automation-id="questionItem">
    <span data-automation-id="questionOrdinal">4</span>
    <div data-automation-id="questionTitle"><span>Dieetvoorkeuren / allergieën</span><span> Single choice.</span></div>
    <div>
      <div data-automation-id="choiceItem">Geen</div>
      <input type="radio" name="diet" value="Geen" />
    </div>
    <div>
      <div data-automation-id="choiceItem">Vegetarisch</div>
      <input type="radio" name="diet" value="Vegetarisch" />
    </div>
    <div>
      <div data-automation-id="choiceItem">Vegan</div>
      <input type="radio" name="diet" value="Vegan" />
    </div>
    <div>
      <input type="radio" name="diet" value="" aria-label="Other answer" />
      <input type="text" data-automation-id="textInput" aria-label="Other answer" />
    </div>
  </div>

  <div data-automation-id="questionItem">
    <span data-automation-id="questionOrdinal">5</span>
    <div data-automation-id="questionTitle"><span>Ik heb de bijdrage van 15 euro gestort via PayConiq.</span><span> Single choice.</span></div>
    <div>
      <div data-automation-id="choiceItem">Ja</div>
      <input type="radio" name="paid" value="Ja" />
    </div>
  </div>
</body>
</html>
