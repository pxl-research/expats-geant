# Docker Compose for M-Autofill Service
# Privacy-first answer suggestion service deployment

services:
  m-autofill:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m-autofill
    ports:
      - "8001:8001"
    environment:
      # JWT Authentication
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24

      # LLM Configuration
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-openrouter/meta-llama/llama-3.1-8b-instruct}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}

      # Session Configuration
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-365}

      # Data Paths
      - SESSIONS_BASE_PATH=/app/data/sessions
      - CHROMA_BASE_PATH=/app/data/chroma

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      # Persistent storage for sessions and audit logs
      - sessions_data:/app/data/sessions
      - chroma_data:/app/data/chroma

      # Optional: Mount .env file for local development
      # - ./.env:/app/.env:ro

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - m-autofill-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - m-autofill-network

volumes:
  sessions_data:
    driver: local
  chroma_data:
    driver: local

networks:
  m-autofill-network:
    driver: bridge
