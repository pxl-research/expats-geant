# Docker Compose for Expats
# Services: cue-api (8001), ui (8002), shape-api (8003), shape_ui (8004), keycloak (8080)

name: expats

services:
  cue-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cue-api
    deploy:
      resources:
        limits:
          memory: 2.5g
        reservations:
          memory: 512m
    ports:
      - "8001:8001"
    environment:
      # JWT Authentication
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      - API_SECRET=${API_SECRET}

      # OIDC: 'keycloak' resolves in Docker (DNS) and on Mac host (/etc/hosts: 127.0.0.1 keycloak)
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/expats
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-cue-api}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-change-me}
      # Redirect Keycloak's authorization code to cue_ui (cue_ui proxies it server-side)
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:8002/auth/callback}

      # LLM Configuration
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-anthropic/claude-haiku-4.5}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}

      # Session Configuration
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-365}

      # Data Paths
      - SESSIONS_BASE_PATH=/app/data/sessions
      - CHROMA_BASE_PATH=/app/data/chroma

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      # Persistent storage for sessions and audit logs
      - sessions_data:/app/data/sessions
      - chroma_data:/app/data/chroma

      # Optional: Mount .env file for local development
      # - ./.env:/app/.env:ro

    depends_on:
      - keycloak

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - cue-api-network

  shape-api:
    build:
      context: .
      dockerfile: shape_api/Dockerfile
    container_name: shape-api
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    ports:
      - "8003:8003"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      - API_SECRET=${API_SECRET}
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/expats
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-shape-api}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-change-me}
      - OIDC_REDIRECT_URI=${SHAPE_OIDC_REDIRECT_URI:-http://localhost:8004/auth/callback}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-anthropic/claude-haiku-4.5}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - SESSIONS_BASE_PATH=/app/data/sessions
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - CHAT_PORT=8003
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - chat_sessions_data:/app/data/sessions
    depends_on:
      - keycloak
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cue-api-network

  ui:
    build:
      context: .
      dockerfile: cue_ui/Dockerfile
    container_name: cue-ui
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    ports:
      - "8002:8002"
    environment:
      # Server-to-server URL (Docker-internal network)
      - AUTOFILL_API_URL=http://cue-api:8001
      # Browser-accessible URL (must be reachable by the end user's browser)
      - AUTOFILL_PUBLIC_URL=${AUTOFILL_PUBLIC_URL:-http://localhost:8001}
      # OIDC issuer URL (Docker-internal; 'keycloak' resolves via Docker DNS and /etc/hosts on Mac host)
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/expats
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-cue-api}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - cue-api
    restart: unless-stopped
    networks:
      - cue-api-network

  shape_ui:
    build:
      context: .
      dockerfile: shape_ui/Dockerfile
    container_name: shape-ui
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    ports:
      - "8004:8004"
    environment:
      - MCHAT_API_URL=http://shape-api:8003
      - MCHAT_PUBLIC_URL=${MCHAT_PUBLIC_URL:-http://localhost:8003}
      # OIDC issuer URL (Docker-internal; 'keycloak' resolves via Docker DNS and /etc/hosts on Mac host)
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/expats
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-cue-api}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - shape-api
    restart: unless-stopped
    networks:
      - cue-api-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    deploy:
      resources:
        limits:
          memory: 1.5g
        reservations:
          memory: 1g
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # 'keycloak' hostname: resolves in Docker (internal DNS) and on Mac host
      # via /etc/hosts (127.0.0.1 keycloak). This keeps the OIDC issuer consistent.
      - KC_HOSTNAME=http://keycloak:8080
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_ADMIN=${KC_HOSTNAME_ADMIN:-http://keycloak:8080}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - cue-api-network

volumes:
  sessions_data:
    driver: local
  chroma_data:
    driver: local
  chat_sessions_data:
    driver: local

networks:
  cue-api-network:
    driver: bridge
