# Docker Compose for M-Autofill Service
# Privacy-first answer suggestion service deployment

services:
  m-autofill:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m-autofill
    ports:
      - "8001:8001"
    environment:
      # JWT Authentication
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24

      # OIDC: 'keycloak' resolves in Docker (DNS) and on Mac host (/etc/hosts: 127.0.0.1 keycloak)
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/expat-geant
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-m-autofill}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-change-me}
      # Redirect Keycloak's authorization code to m_ui (m_ui proxies it server-side)
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:8002/auth/callback}

      # LLM Configuration
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-anthropic/claude-haiku-4.5}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}

      # Session Configuration
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-365}

      # Data Paths
      - SESSIONS_BASE_PATH=/app/data/sessions
      - CHROMA_BASE_PATH=/app/data/chroma

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      # Persistent storage for sessions and audit logs
      - sessions_data:/app/data/sessions
      - chroma_data:/app/data/chroma

      # Optional: Mount .env file for local development
      # - ./.env:/app/.env:ro

    depends_on:
      - keycloak

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - m-autofill-network

  m-chat:
    build:
      context: .
      dockerfile: m_chat/Dockerfile
    container_name: m-chat
    ports:
      - "8003:8003"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/expat-geant
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-m-chat}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-change-me}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:8002/auth/callback}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-anthropic/claude-haiku-4.5}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - SESSIONS_BASE_PATH=/app/data/sessions
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - CHAT_PORT=8003
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - chat_sessions_data:/app/data/sessions
    depends_on:
      - keycloak
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - m-autofill-network

  ui:
    build:
      context: .
      dockerfile: m_ui/Dockerfile
    container_name: m-ui
    ports:
      - "8002:8002"
    environment:
      # Server-to-server URL (Docker-internal network)
      - AUTOFILL_API_URL=http://m-autofill:8001
      # Browser-accessible URL (must be reachable by the end user's browser)
      - AUTOFILL_PUBLIC_URL=${AUTOFILL_PUBLIC_URL:-http://localhost:8001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - m-autofill
    restart: unless-stopped
    networks:
      - m-autofill-network

  m_chat_ui:
    build:
      context: .
      dockerfile: m_chat_ui/Dockerfile
    container_name: m-chat-ui
    ports:
      - "8004:8004"
    environment:
      - MCHAT_API_URL=http://m-chat:8003
      - MCHAT_PUBLIC_URL=${MCHAT_PUBLIC_URL:-http://localhost:8003}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - m-chat
    restart: unless-stopped
    networks:
      - m-autofill-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # 'keycloak' hostname: resolves in Docker (internal DNS) and on Mac host
      # via /etc/hosts (127.0.0.1 keycloak). This keeps the OIDC issuer consistent.
      - KC_HOSTNAME=keycloak
      - KC_HOSTNAME_PORT=8080
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - m-autofill-network

volumes:
  sessions_data:
    driver: local
  chroma_data:
    driver: local
  chat_sessions_data:
    driver: local

networks:
  m-autofill-network:
    driver: bridge
