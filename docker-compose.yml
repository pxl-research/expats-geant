# Docker Compose for Expats
# Services: cue-api (8801), ui (8811), shape-api (8802), shape_ui (8812), keycloak (8080)

name: expats

# Bounded container logs: rotate at 20 MB, keep 5 files (~100 MB/service max).
# Applied to every service via `logging: *default-logging`.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  cue-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cue-api
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2.5g
        reservations:
          memory: 512m
    ports:
      - "8801:8801"
    environment:
      # JWT Authentication
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      - API_SECRET=${API_SECRET}

      # OIDC: 'keycloak' resolves in Docker (DNS) and on Mac host (/etc/hosts: 127.0.0.1 keycloak)
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/expats
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-cue-api}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-change-me}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-}
      - OIDC_REDIRECT_PORT=8811
      - PUBLIC_HOST=${PUBLIC_HOST:-}

      # LLM Configuration
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${CUE_LLM_MODEL:-}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-anthropic/claude-haiku-4.5}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}

      # Session Configuration
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-365}

      # Data Paths
      - SESSIONS_BASE_PATH=/app/data/sessions
      - CHROMA_BASE_PATH=/app/data/chroma

      # Query rewriting
      - CUE_QUERY_REWRITE=${CUE_QUERY_REWRITE:-true}
      - CUE_REWRITE_BATCH_SIZE=${CUE_REWRITE_BATCH_SIZE:-20}
      - CUE_REWRITE_MODEL=${CUE_REWRITE_MODEL:-}

      # Web URL ingestion (operator gate; per-session consent still required)
      - CUE_WEB_INGEST_ENABLED=${CUE_WEB_INGEST_ENABLED:-false}

      # Browser-extension CORS allow-list. Comma-separated chrome-extension://
      # and moz-extension:// origins. Empty by default. Required for the Cue
      # browser extension (cue_extension/) to call this API.
      - EXTENSION_ALLOWED_ORIGINS=${EXTENSION_ALLOWED_ORIGINS:-}

      # Multi-tenant credential routing (optional)
      - TENANT_REGISTRY_PATH=${TENANT_REGISTRY_PATH:-}
      - TENANT_ENCRYPTION_KEY=${TENANT_ENCRYPTION_KEY:-}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}

    volumes:
      # Persistent storage for sessions and audit logs
      - sessions_data:/app/data/sessions
      - chroma_data:/app/data/chroma
      - ./.secrets:/app/.secrets:ro

    depends_on:
      - keycloak

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8801/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - cue-api-network

  shape-api:
    build:
      context: .
      dockerfile: shape_api/Dockerfile
    container_name: shape-api
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    ports:
      - "8802:8802"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      - API_SECRET=${API_SECRET}
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/expats
      # Shares the single bundled realm client with the other services; the
      # realm export and keycloak-init script only configure 'cue-api'.
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-cue-api}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-change-me}
      - OIDC_REDIRECT_URI=${SHAPE_OIDC_REDIRECT_URI:-}
      - OIDC_REDIRECT_PORT=8812
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${SHAPE_LLM_MODEL:-}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-anthropic/claude-haiku-4.5}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - SESSIONS_BASE_PATH=/app/data/sessions
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - TENANT_REGISTRY_PATH=${TENANT_REGISTRY_PATH:-}
      - TENANT_ENCRYPTION_KEY=${TENANT_ENCRYPTION_KEY:-}
      - CHAT_PORT=8802
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - chat_sessions_data:/app/data/sessions
      - ./.secrets:/app/.secrets:ro
    depends_on:
      - keycloak
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8802/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cue-api-network

  ui:
    build:
      context: .
      dockerfile: cue_ui/Dockerfile
    container_name: cue-ui
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    ports:
      - "8811:8811"
    environment:
      - CUE_API_URL=http://cue-api:8801
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/expats
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-cue-api}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      - cue-api
    restart: unless-stopped
    networks:
      - cue-api-network

  shape_ui:
    build:
      context: .
      dockerfile: shape_ui/Dockerfile
    container_name: shape-ui
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    ports:
      - "8812:8812"
    environment:
      - SHAPE_API_URL=http://shape-api:8802
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/expats
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-cue-api}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      - shape-api
    restart: unless-stopped
    networks:
      - cue-api-network

  keycloak:
    # Custom image bakes in realm-export.json + keycloak-init.sh, so no host
    # bind mounts are required (works when only the pushed image is present,
    # e.g. Portainer stacks from prebuilt images). Build/push like the others.
    image: expats-keycloak:latest
    build:
      context: .
      dockerfile: keycloak/Dockerfile
    container_name: keycloak
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1.5g
        reservations:
          memory: 1g
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Keycloak public hostname: derived from PUBLIC_HOST for non-localhost deployments
      - KC_HOSTNAME=http://${PUBLIC_HOST:-keycloak}:8080
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_ADMIN=http://${PUBLIC_HOST:-keycloak}:8080
    ports:
      - "8080:8080"
    networks:
      - cue-api-network

  # One-shot: waits for Keycloak, then sets the cue-api client redirect URIs /
  # web origins for the current ports (localhost + PUBLIC_HOST). Idempotent, so
  # it self-heals port changes on an existing Keycloak volume — no manual
  # setup_keycloak.sh run needed. Exits 0 when done. Reuses the custom Keycloak
  # image (which has kcadm + the baked-in init script); no bind mount needed.
  keycloak-init:
    image: expats-keycloak:latest
    container_name: keycloak-init
    logging: *default-logging
    depends_on:
      - keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - PUBLIC_HOST=${PUBLIC_HOST:-}
    entrypoint: ["/bin/bash", "/opt/keycloak/bin/keycloak-init.sh"]
    restart: "no"
    networks:
      - cue-api-network

volumes:
  sessions_data:
    driver: local
  chroma_data:
    driver: local
  chat_sessions_data:
    driver: local

networks:
  cue-api-network:
    driver: bridge
