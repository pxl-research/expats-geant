<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cue Survey Review{% endblock %}</title>
  <script src="/static/htmx.min.js"></script>
  <script src="/static/htmx-ext-sse.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --surface: #f8fafc;
      --surface-card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --accent: #7c3aed;
      --radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: var(--brand);
      color: #fff;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    nav .brand { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.02em; }
    nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.875rem; }
    nav a:hover { color: #fff; }
    nav .spacer { flex: 1; }

    main { flex: 1; padding: 2rem 1.5rem; max-width: 860px; margin: 0 auto; width: 100%; }

    .card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.75rem; }
    p  { line-height: 1.6; color: var(--text-muted); }

    .btn {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.5rem 1.125rem; border-radius: var(--radius);
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      border: none; text-decoration: none; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary  { background: var(--brand); color: #fff; }
    .btn-ghost    { background: transparent; color: var(--brand); border: 1px solid var(--brand); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-success  { background: var(--success); color: #fff; }

    .alert {
      padding: 0.75rem 1rem; border-radius: var(--radius);
      font-size: 0.875rem; margin-bottom: 1rem;
    }
    .alert-error   { background: #fef2f2; color: var(--danger);  border: 1px solid #fecaca; }
    .alert-warning { background: #fffbeb; color: var(--warning); border: 1px solid #fde68a; }
    .alert-success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
    .alert-info    { background: #eff6ff; color: var(--brand);   border: 1px solid #bfdbfe; }

    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.375rem; }
    input[type="text"], input[type="file"], select, textarea {
      width: 100%; padding: 0.5rem 0.75rem;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 0.875rem; background: #fff;
    }
    textarea { resize: vertical; min-height: 80px; }

    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }

    footer {
      text-align: center; padding: 1rem;
      font-size: 0.75rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <span class="brand">Cue</span>
  <span class="text-muted" style="font-size:0.8rem; color:rgba(255,255,255,0.7);">Survey Review</span>
  <span class="spacer"></span>
  <a href="/auth/logout">Sign out</a>
</nav>

{% if flash %}
<div style="max-width:860px; margin:0.75rem auto; padding:0 1.5rem;">
  <div class="alert alert-{{ flash.level }}">{{ flash.message }}</div>
</div>
{% endif %}

<main>
  {% block content %}{% endblock %}
</main>

<footer>Cue &mdash; Privacy-first AI survey assistant &mdash; GÉANT</footer>
</body>
</html>
