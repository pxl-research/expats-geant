{% extends "base.html" %}
{% block title %}Audit Report — Cue{% endblock %}

{% block head %}
<style>
  .audit-report h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .audit-report h2 {
    font-size: 1.15rem; margin-top: 1.75rem; margin-bottom: 0.75rem;
    padding-bottom: 0.375rem; border-bottom: 1px solid var(--border);
  }
  .audit-report h3 { font-size: 1rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
  .audit-report p { margin: 0.375rem 0; line-height: 1.6; }
  .audit-report ul { margin: 0.375rem 0; padding-left: 1.5rem; }
  .audit-report li { margin-bottom: 0.25rem; }

  .audit-report table {
    width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.9rem;
  }
  .audit-report th, .audit-report td {
    padding: 0.5rem 0.75rem; border: 1px solid var(--border); text-align: left;
  }
  .audit-report th { background: #f1f5f9; font-weight: 600; }

  .page-actions {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  @media print {
    nav, footer, .page-actions { display: none !important; }
    main { max-width: 100%; padding: 0; margin: 0; }
    body { background: white; }
    .audit-report { font-size: 11pt; }
    .audit-report h1 { font-size: 16pt; }
    .audit-report h2 { font-size: 13pt; page-break-after: avoid; }
    .audit-report h3 { page-break-after: avoid; }
    .audit-report table { page-break-inside: avoid; }
  }
</style>
{% endblock %}

{% block content %}
<div class="page-actions">
  <a href="/session/{{ session_id }}/review" class="btn btn-ghost">&larr; Back to review</a>
  <button class="btn btn-primary print-btn">Print / Save as PDF</button>
</div>

{% if not report_markdown %}
<div class="alert alert-info" style="margin-top:1rem;">
  No audit data available for this session.
</div>
{% else %}
<div class="audit-report">
  {{ report_markdown | markdown | safe }}
</div>
{% endif %}

<script src="/static/audit-report.js"></script>
{% endblock %}
