<dialog id="cleanup-modal" style="border:1px solid var(--border); border-radius:var(--radius); padding:2rem; max-width:420px; width:90%">
  <h2 style="margin-bottom:0.5rem; font-size:1.1rem;">Delete session data?</h2>
  <p style="color:var(--text-muted); margin-bottom:1.5rem; font-size:0.9rem;">
    Your documents, suggestions, and vectors can now be removed. This cannot be undone.
    If you prefer, your session will expire automatically after its TTL.
  </p>
  <p id="cleanup-error" hidden style="color:var(--danger, #c0392b); font-size:0.85rem; margin-bottom:1rem;">Could not delete session. Please try again.</p>
  <div style="display:flex; gap:0.75rem; justify-content:flex-end">
    <button type="button" class="btn btn-ghost" id="cleanup-keep-btn">Keep session</button>
    <button type="button" class="btn btn-danger" id="cleanup-delete-btn">Delete session data</button>
  </div>
</dialog>
<script src="/static/session-cleanup.js"></script>
